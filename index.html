<style>
  :root {
    --cream: #FAF6EE;
    --cream-dark: #F0E9D8;
    --orange: #E8600A;
    --orange-light: #FF7A20;
    --charcoal: #1C1814;
    --ink: #2E2820;
    --muted: #7A6E60;
    --border: #DDD3BB;

    /* Niche colors */
    --finance-bg: #E8F5EA; --finance-fg: #1E5C2A;
    --business-bg: #E6F1FB; --business-fg: #0C447C;
    --productivity-bg: #FFF4DC; --productivity-fg: #7A4200;
    --education-bg: #F0E8FF; --education-fg: #4A2A8A;

    /* Difficulty */
    --easy-bg: #E8F5EA; --easy-fg: #2E6B38;
    --medeasy-bg: #FFF4DC; --medeasy-fg: #A36300;
    --medium-bg: #FDEAE3; --medium-fg: #A83008;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--cream); color: var(--ink); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* HEADER */
  .header {
    background: var(--charcoal);
    padding: 2.75rem 2rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(232,96,10,0.15) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 50%, rgba(232,96,10,0.10) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(255,122,32,0.08) 0%, transparent 50%);
    pointer-events: none;
  }
  .header-eyebrow {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--orange); margin-bottom: 0.85rem;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.9rem, 5vw, 3.4rem);
    font-weight: 900; color: var(--cream); line-height: 1.1;
    margin-bottom: 0.9rem;
  }
  .header h1 span { color: var(--orange-light); }
  .niche-tags {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
  }
  .niche-tag {
    font-size: 11px; font-weight: 500; padding: 4px 12px;
    border-radius: 20px; letter-spacing: 0.04em;
  }
  .nt-finance  { background: rgba(232,245,234,0.15); color: #8BC898; border: 1px solid rgba(139,200,152,0.3); }
  .nt-business { background: rgba(230,241,251,0.15); color: #8AB8DF; border: 1px solid rgba(138,184,223,0.3); }
  .nt-productivity { background: rgba(255,244,220,0.15); color: #F5C875; border: 1px solid rgba(245,200,117,0.3); }
  .nt-education { background: rgba(240,232,255,0.15); color: #C4A3F0; border: 1px solid rgba(196,163,240,0.3); }

  /* TOOLBAR */
  .toolbar {
    background: var(--cream-dark);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    position: sticky; top: 0; z-index: 100;
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  }
  .search-wrap { flex: 1; min-width: 220px; position: relative; }
  .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; opacity: 0.4; pointer-events: none; }
  .search-input {
    width: 100%; padding: 9px 14px 9px 38px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--cream); color: var(--ink);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--orange); }
  .search-input::placeholder { color: var(--muted); }

  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    padding: 6px 13px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent;
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .pill:hover { border-color: var(--orange); color: var(--orange); }
  .pill.active { background: var(--orange); border-color: var(--orange); color: #fff; }

  /* Niche pills colored when active */
  .pill.active.p-finance { background: var(--finance-fg); border-color: var(--finance-fg); }
  .pill.active.p-business { background: var(--business-fg); border-color: var(--business-fg); }
  .pill.active.p-productivity { background: var(--productivity-fg); border-color: var(--productivity-fg); }
  .pill.active.p-education { background: var(--education-fg); border-color: var(--education-fg); }

  /* MAIN */
  .main { max-width: 1140px; margin: 0 auto; padding: 1.75rem 1.5rem 4rem; }
  .results-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 8px; }
  .results-count { font-size: 13px; color: var(--muted); }
  .results-count strong { color: var(--orange); font-weight: 500; }
  .sort-select {
    padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--cream); font-family: 'DM Sans', sans-serif;
    font-size: 12px; color: var(--ink); cursor: pointer; outline: none;
  }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
  .card {
    background: #fff; border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 18px; display: flex; flex-direction: column; gap: 10px;
    transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
  }
  .card:hover { box-shadow: 0 5px 22px rgba(232,96,10,0.10); border-color: var(--orange); transform: translateY(-2px); }

  /* Colored left accent by niche */
  .card.finance    { border-left: 3px solid var(--finance-fg); }
  .card.business   { border-left: 3px solid var(--business-fg); }
  .card.productivity { border-left: 3px solid var(--productivity-fg); }
  .card.education  { border-left: 3px solid var(--education-fg); }

  .card-top { display: flex; align-items: flex-start; gap: 9px; }
  .card-num { font-family: 'Playfair Display', serif; font-size: 11px; font-weight: 700; color: var(--orange); opacity: 0.55; flex-shrink: 0; margin-top: 2px; }
  .card-title { font-size: 13.5px; font-weight: 500; color: var(--ink); line-height: 1.45; }
  .card-badges { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .badge { font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }

  /* Niche badges */
  .b-finance      { background: var(--finance-bg);      color: var(--finance-fg); }
  .b-business     { background: var(--business-bg);     color: var(--business-fg); }
  .b-productivity { background: var(--productivity-bg); color: var(--productivity-fg); }
  .b-education    { background: var(--education-bg);    color: var(--education-fg); }

  /* Difficulty badges */
  .b-easy    { background: #E8F5EA; color: #2E6B38; }
  .b-medeasy { background: #FFF4DC; color: #A36300; }
  .b-medium  { background: #FDEAE3; color: #A83008; }

  /* AI badge */
  .b-ai  { background: #EAE8FF; color: #3D33A8; }
  .b-rpm { background: #E3F5F0; color: #145C4A; }

  .card-desc { font-size: 12px; color: var(--muted); line-height: 1.55; border-top: 1px solid #F0E9D8; padding-top: 9px; }
  .no-results { grid-column: 1/-1; text-align: center; padding: 5rem 1rem; color: var(--muted); font-size: 15px; }

  /* LEGEND */
  .legend {
    display: flex; gap: 16px; flex-wrap: wrap;
    margin-bottom: 1.25rem; font-size: 12px; color: var(--muted); align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* FOOTER */
  .footer { background: var(--charcoal); padding: 1.5rem 2rem; text-align: center; font-size: 12px; color: #5A5044; letter-spacing: 0.05em; }
  .footer span { color: var(--orange); }

  @media (max-width: 600px) {
    .header { padding: 2rem 1.25rem 1.75rem; }
    .toolbar { padding: 0.85rem 1rem; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>

let activeFilter = 'all';

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  const rawQ = document.getElementById('search').value;
  const words = rawQ.toLowerCase().trim().split(/\s+/).filter(Boolean);
  const sort = document.getElementById('sort-select').value;

  let filtered = ideas.filter(idea => {
    const matchFilter =
      activeFilter === 'all' ||
      (activeFilter === 'finance' && idea.n === 'finance') ||
      (activeFilter === 'business' && idea.n === 'business') ||
      (activeFilter === 'productivity' && idea.n === 'productivity') ||
      (activeFilter === 'education' && idea.n === 'education') ||
      (activeFilter === 'ai' && idea.ai) ||
      (activeFilter === 'easy' && idea.d === 'easy') ||
      (activeFilter === 'medium-easy' && idea.d === 'medium-easy') ||
      (activeFilter === 'medium' && idea.d === 'medium');

    const searchable = (idea.t + ' ' + idea.desc + ' ' + idea.tags.join(' ')).toLowerCase();
    const matchSearch = words.length === 0 || words.every(w => searchable.includes(w));
    return matchFilter && matchSearch;
  });

  const nicheOrder = { finance: 0, business: 1, productivity: 2, education: 3 };
  const diffOrder  = { easy: 0, 'medium-easy': 1, medium: 2 };
  if (sort === 'niche')       filtered.sort((a, b) => nicheOrder[a.n] - nicheOrder[b.n]);
  else if (sort === 'easy-first')  filtered.sort((a, b) => diffOrder[a.d]  - diffOrder[b.d]);
  else if (sort === 'hard-first')  filtered.sort((a, b) => diffOrder[b.d]  - diffOrder[a.d]);
  else if (sort === 'az')          filtered.sort((a, b) => a.t.localeCompare(b.t));

  document.getElementById('count-num').textContent = filtered.length;

  const nicheMeta = {
    finance:     { badge: 'b-finance',      label: 'Finance & Money',   cls: 'finance' },
    business:    { badge: 'b-business',     label: 'Business & SaaS',   cls: 'business' },
    productivity:{ badge: 'b-productivity', label: 'Productivity',       cls: 'productivity' },
    education:   { badge: 'b-education',    label: 'Education',          cls: 'education' },
  };
  const diffMeta = {
    easy:          ['b-easy',    'Easy'],
    'medium-easy': ['b-medeasy', 'Medium Easy'],
    medium:        ['b-medium',  'Medium'],
  };

  const grid = document.getElementById('grid');

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="no-results">No ideas matched "<strong>${rawQ}</strong>" — try a different keyword.</div>`;
    return;
  }

  grid.innerHTML = filtered.map((idea, i) => {
    const nm  = nicheMeta[idea.n];
    const [dc, dl] = diffMeta[idea.d];
    const aiBadge = idea.ai ? `<span class="badge b-ai">AI</span>` : '';
    const rpmBadge = idea.rpm === 'high' ? `<span class="badge b-rpm">High RPM</span>` : '';
    return `<div class="card ${nm.cls}">
      <div class="card-top">
        <span class="card-num">#${String(i+1).padStart(3,'0')}</span>
        <span class="card-title">${idea.t}</span>
      </div>
      <div class="card-badges">
        <span class="badge ${nm.badge}">${nm.label}</span>
        <span class="badge ${dc}">${dl}</span>
        ${rpmBadge}${aiBadge}
      </div>
      <div class="card-desc">${idea.desc}</div>
    </div>`;
  }).join('');
}

render();
